services:
  postgres-test-db:
    image: postgres:18
    container_name: evora-test-db
    environment:
      POSTGRES_USER: db_admin
      POSTGRES_PASSWORD: evora123
      POSTGRES_DB: evoradb_test
    ports:
      - "5433:5432"  # Different port so it doesn't conflict with dev DB
    networks:
      - evora-test-net

  user-service-test:
    build: ./user-service
    container_name: evora-user-service-test
    environment:
      DATABASE_URL: postgresql+psycopg2://db_admin:evora123@postgres-test-db:5432/evoradb_test
    command: ["pytest", "tests/"] # Override to run tests
    depends_on:
      - postgres-test-db
    networks:
      - evora-test-net
    volumes:
      - ./user-service:/app

# Add other services here as they get test suites

networks:
  evora-test-net:
