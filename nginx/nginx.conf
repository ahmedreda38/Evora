events {
    worker_connections 1024;
}

http {

    server {
        listen 80;
        server_name evora.com;
        return 301 https://$server_name$request_uri;
    }


    server {
        listen 443 ssl;
        http2 on;
        server_name evora.com;


        ssl_certificate /etc/nginx/ssl/evora.crt;
        ssl_certificate_key /etc/nginx/ssl/evora.key;

        location /users/ {
            proxy_pass http://user-service:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /events/ {
            proxy_pass http://event-service:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /register/ {
            proxy_pass http://event-registration-service:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /notifications/ {
            proxy_pass http://notification-service:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }


    }

}

