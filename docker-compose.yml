services:
  postgres-db:
    image: postgres:18
    container_name: evora-db
    environment:
      POSTGRES_USER: db_admin
      POSTGRES_PASSWORD: evora123
      POSTGRES_DB: evoradb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - evora-net

  user-service:
    build: ./user-service
    container_name: evora-user-service
    environment:
      DATABASE_URL: postgresql+psycopg2://db_admin:evora123@postgres-db:5432/evoradb
    ports:
      - "8000:8000"
    depends_on:
      - postgres-db
    networks:
      - evora-net
    # for easy development so the container gets updated when the code changes
    volumes:
      - ./user-service:/app

  event-service:
    build: ./event-service
    container_name: evora-event-service
    environment:
      DATABASE_URL: postgresql+psycopg2://db_admin:evora123@postgres-db:5432/evoradb
    ports:
      - "8001:8000"
    depends_on:
      - postgres-db
    networks:
      - evora-net

  event-registration-service:
    build: ./event-registration-service
    container_name: evora-event-registration-service
    environment:
      DATABASE_URL: postgresql+psycopg2://db_admin:evora123@postgres-db:5432/evoradb
    ports:
      - "8002:8000"
    depends_on:
      - postgres-db
      - event-service
      - user-service
    networks:
      - evora-net

  notification-service:
    build: ./notifications-emailing-service
    container_name: evora-notification-service
    environment:
      DATABASE_URL: postgresql+psycopg2://db_admin:evora123@postgres-db:5432/evoradb
    ports:
      - "8003:8000"
    depends_on:
      - postgres-db
    networks:
      - evora-net

volumes:
  pgdata:

networks:
  evora-net:
